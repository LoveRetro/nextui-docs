site_name: NextUI Docs
site_url: https://nextui.loveretro.games
repo_url: https://github.com/LoveRetro/NextUI
edit_uri: https://github.com/LoveRetro/nextui-wiki/edit/main/docs/
repo_name: LoveRetro/NextUI
copyright: © 2025 NextUI Contributors

theme:
  name: material
  custom_dir: marketing/out
  logo: _inc/images/nextui-logo.png
  favicon: _inc/images/favicon.png
  font:
    text: Raleway
    code: Fira Code
  icon:
    admonition:
      warning: octicons/alert-24
      info: octicons/info-24
      example: octicons/sparkles-fill-24
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: nextui-wiki-light
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: nextui-wiki-dark
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.action.edit
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - navigation.expand
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate

extra_css:
  - _inc/css/custom.css
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LoveRetro/NextUI
    - icon: fontawesome/brands/discord
      link: https://discord.gg/HKd7wqZk3h

  urls:
    discord: https://discord.gg/HKd7wqZk3h
    github: https://github.com/LoveRetro/NextUI

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      toc_depth: 3
      permalink: 🔗

plugins:
  - search
  - macros

nav:
  - Docs Home: docs.md
  - Getting Started:
      - Overview: usage.md
      - Prerequisites: getting-started/index.md
      - Installation: getting-started/installation.md
      - Updating: getting-started/updating.md
      - Controls and Shortcuts: getting-started/controls.md
      - ROMs, BIOS, and Arcade: getting-started/roms.md
      - Emulator Notes: getting-started/emulator-notes.md
      - BIOS: getting-started/bios.md
      - Saves and Migration: getting-started/managing-saves.md
      - RetroAchievements: getting-started/retroachievements.md
      - Cheats: getting-started/cheats.md
  - Paks:
      - Overview: paks.md
      - Pak Store: pak-store.md
      - File Transfer: paks/file-transfer.md
      - PortMaster: paks/portmaster.md
      - Pak Troubleshooting: paks/troubleshooting.md
      - Making Paks: paks/making-paks.md
  - Customizing:
      - Overview: customizing.md
      - Artwork: customizing/game-artwork.md
      - Overlays: customizing/overlays.md
      - Shaders: shaders/index.md
      - LEDs, Power, and Clock: customizing/power-leds-clock.md
      - Custom Boot Logo: customizing/theming/custom-boot-logo.md
      - Emulator Icons: customizing/theming/emulator-icons.md
      - Quick Menu Theme: customizing/theming/quick-menu-theme.md
      - Collections: customizing/custom-categories.md
  - Support:
      - Frequently Asked Questions: support/faq.md
      - Troubleshooting: support/troubleshooting.md
  - Development: development/build.md
  - NextUI Homepage:
      - index.md
  - Web Dashboard: https://dashboard.loveretro.games/
